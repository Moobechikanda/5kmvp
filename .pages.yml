media:
  input: public/images/uploads
  output: /images/uploads

content:
  - name: posts
    label: Articles
    type: collection
    path: content/posts
    filename: "{primary}.md"

    view:
      fields: [title, type, date, draft]

    fields:
      - name: title
        label: Title
        type: text
        required: true

      - name: slug
        label: Slug
        type: text

      - name: type
        label: Article Type
        type: select
        options:
          - Guide
          - Review
          - Comparison
          - News

      - name: description
        label: Meta Description
        type: textarea

      - name: image
        label: Featured Image
        type: image

      - name: author
        label: Author
        type: text

      - name: category
        label: Category
        type: text

      - name: tags
        label: Tags
        type: list

      - name: date
        label: Published
        type: date

      - name: updated
        label: Updated
        type: date

      - name: draft
        label: Draft
        type: boolean
        default: false

      - name: featured
        label: Featured
        type: boolean
        default: false

      - name: seo_title
        label: SEO Title
        type: text

      - name: canonical
        label: Canonical URL
        type: text

      - name: body
        label: Content
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: content/pages
    filename: "{primary}.md"

    fields:
      - name: title
        type: text

      - name: slug
        type: text

      - name: body
        type: rich-text

  - name: authors
    label: Authors
    type: collection
    path: content/authors
    filename: "{primary}.md"

    fields:
      - name: name
        type: text

      - name: bio
        type: textarea

      - name: avatar
        type: image