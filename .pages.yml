media:
  input: public/images/uploads
  output: /images/uploads

content:
  - name: posts
    label: Articles
    type: collection
    path: src/content/posts
    filename: "{primary}.md"

    view:
      fields: [title, type, date, draft]

    fields:
      - name: title
        label: Title
        type: text
        required: true

      - name: slug
        label: Slug
        type: text

      - name: type
        label: Article Type
        type: select
        options:
          - Guide
          - Review
          - Comparison
          - News

      - name: description
        label: Meta Description
        type: textarea

      - name: image
        label: Featured Image
        type: image

      - name: author
        label: Author
        type: text

      - name: category
        label: Category
        type: text

      - name: tags
        label: Tags
        type: list

      - name: date
        label: Published
        type: date

      - name: updated
        label: Updated
        type: date

      - name: draft
        label: Draft
        type: boolean
        default: false

      - name: featured
        label: Featured Article
        type: boolean
        default: false

      - name: lastUpdated
        label: Last Updated
        type: date
        required: false

      - name: tool
        label: Tool Name
        type: text
        required: false

      - name: officialWebsite
        label: Official Website
        type: text
        required: false

      - name: pricing
        label: Pricing
        type: select
        options:
          - Free
          - Freemium
          - Paid
          - Enterprise

      - name: startingPrice
        label: Starting Price
        type: text
        required: false

      - name: rating
        label: Rating
        type: number
        min: 1
        max: 5
        step: 0.1
        required: false

      - name: pros
        label: Pros
        type: list
        required: false

      - name: cons
        label: Cons
        type: list
        required: false

      - name: faq
        label: FAQ
        type: list
        required: false
        fields:
          - name: question
            type: text
          - name: answer
            type: textarea

      - name: seo
        label: SEO
        type: object
        fields:
          - name: title
            label: SEO Title
            type: text

          - name: description
            label: SEO Description
            type: textarea

          - name: canonical
            label: Canonical URL
            type: text
            required: false

          - name: noindex
            label: No Index
            type: boolean
            default: false

          - name: ogImage
            label: OG Image
            type: image
            required: false

      - name: body
        label: Content
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    filename: "{primary}.md"

    fields:
      - name: title
        type: text

      - name: slug
        type: text

      - name: body
        type: rich-text

  - name: authors
    label: Authors
    type: collection
    path: src/content/authors
    filename: "{primary}.md"

    fields:
      - name: name
        type: text

      - name: bio
        type: textarea

      - name: avatar
        type: image