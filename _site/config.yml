backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Type", name: "type", widget: "select", options: ["Guide", "Review", "Comparison", "News"] }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "admin" }
      - label: "Image"
        name: "image"
        widget: "string"
      - { label: "Alt Text", name: "imageAlt", widget: "string", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Reading Time", name: "readingTime", widget: "number", default: 5 }
      - { label: "Rating", name: "rating", widget: "number", default: 4, min: 1, max: 5 }
      - { label: "Keywords", name: "keywords", widget: "list", required: false }
      - { label: "Difficulty", name: "difficulty", widget: "select", options: ["beginner", "intermediate", "advanced"], required: false }
      - { label: "FAQ", name: "faq", widget: "list", field: { label: "FAQ Item", name: "faq", widget: "object", fields: [ { label: "Question", name: "question", widget: "string" }, { label: "Answer", name: "answer", widget: "text" } ] }, required: false }
      - { label: "Pros", name: "pros", widget: "list", required: false }
      - { label: "Cons", name: "cons", widget: "list", required: false }
      - { label: "Tools", name: "tools", widget: "list", field: { label: "Tool", name: "tool", widget: "object", fields: [ { label: "Name", name: "name", widget: "string" }, { label: "URL", name: "url", widget: "string" }, { label: "Pricing", name: "pricing", widget: "string" } ] }, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
